{% extends 'allauth/layouts/base.html' %}
{% load static %}

{% block title %}
    Criar Idioma
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <i class="bi bi-translate text-primary"
           style="font-size:4rem;"></i>

        <h1 class="fw-bold mt-3">
            Criar Idioma
        </h1>

        <p class="text-muted">
            Cadastre um novo idioma
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card global-card border-0 shadow-sm">

                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Idioma

                            </label>

                            <input type="text"
                                   name="language"
                                   class="form-control">

                        </div>

                        <div class="text-end">

                            <a href="#" onclick="history.back(); return False;"
                               class="btn btn-outline-secondary">

                                Voltar

                            </a>

                            <button class="btn btn-primary">

                                Salvar

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
