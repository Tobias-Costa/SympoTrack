{% extends 'allauth/layouts/base.html' %}

{% load static %}

{% block title %}
    Criar Categoria
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <div class="mb-3">
            <i class="bi bi-tags text-primary"
               style="font-size: clamp(3rem, 5vw, 4rem);"></i>
        </div>

        <h1 class="fw-bold mb-3">
            Criar Categoria
        </h1>

        <p class="text-muted mb-0">
            Cadastre uma nova categoria para eventos
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card global-card border-0 shadow-sm">

                <div class="card-body p-4 p-lg-5">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Nome da Categoria

                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Ex.: Congresso">

                        </div>

                        <div class="d-flex justify-content-end gap-3">

                            <a href="{% url 'register_event' %}"
                               class="btn btn-outline-secondary">

                                Cancelar

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                Salvar Categoria

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
