{% extends 'allauth/layouts/base.html' %}

{% load static %}

{% block title %}
    Criar Endereço
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <div class="mb-3">
            <i class="bi bi-geo-alt text-primary"
               style="font-size: clamp(3rem, 5vw, 4rem);"></i>
        </div>

        <h1 class="fw-bold mb-3">
            Criar Endereço
        </h1>

        <p class="text-muted mb-0">
            Cadastre um novo local para eventos
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-xl-8">

            <div class="card global-card border-0 shadow-sm">

                <div class="card-body p-4 p-lg-5">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row g-4">

                            <div class="col-12">

                                <label class="form-label fw-semibold">

                                    Nome do Local

                                </label>

                                <input type="text"
                                       name="place_name"
                                       class="form-control"
                                       placeholder="Centro de Eventos do Ceará">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label fw-semibold">

                                    CEP

                                </label>

                                <input type="text"
                                       name="cep"
                                       class="form-control">

                            </div>

                            <div class="col-md-8">

                                <label class="form-label fw-semibold">

                                    Rua

                                </label>

                                <input type="text"
                                       name="street"
                                       class="form-control">

                            </div>

                            <div class="col-md-3">

                                <label class="form-label fw-semibold">

                                    Número

                                </label>

                                <input type="text"
                                       name="number"
                                       class="form-control">

                            </div>

                            <div class="col-md-9">

                                <label class="form-label fw-semibold">

                                    Complemento

                                </label>

                                <input type="text"
                                       name="complement"
                                       class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label fw-semibold">

                                    Bairro

                                </label>

                                <input type="text"
                                       name="neighborhood"
                                       class="form-control">

                            </div>

                            <div class="col-md-6">

                                <label class="form-label fw-semibold">

                                    Cidade

                                </label>

                                <select name="city"
                                        class="form-select">

                                    <option value="">---</option>

                                    {% for city in cities %}

                                        <option value="{{ city.id }}">
                                            {{ city.name }} - {{ city.state.uf }}
                                        </option>

                                    {% endfor %}

                                </select>

                                <div class="mt-2">

                                    <a href="{% url 'register_city' %}"
                                    class="small text-decoration-none">

                                        Não está achando?
                                        Crie uma cidade agora!

                                    </a>

                                </div>

                            </div>

                        </div>

                        <hr class="my-5">

                        <div class="d-flex justify-content-end gap-3">

                            <a href="{% url 'register_event' %}"
                               class="btn btn-outline-secondary">

                                Cancelar

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                Salvar Endereço

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
