{% extends 'allauth/layouts/base.html' %}

{% load static %}

<!-- ===================================================== -->
<!-- TÍTULO -->
<!-- ===================================================== -->
{% block title %}
Editar Grupo de Gerenciamento
{% endblock %}

<!-- ===================================================== -->
<!-- CONTEÚDO -->
<!-- ===================================================== -->
{% block content %}

<div class="container py-5">

    <!-- ================================================= -->
    <!-- CABEÇALHO -->
    <!-- ================================================= -->

    <div class="text-center mb-5">

        <div class="mb-3">

            <i class="bi bi-people-fill text-primary"
               style="font-size: clamp(3rem,5vw,4rem);"></i>

        </div>

        <h1 class="fw-bold mb-3">

            Editar Grupo

        </h1>

        <p class="text-muted">

            {{ management_group.name }}

        </p>

    </div>


    <!-- ================================================= -->
    <!-- FORMULÁRIO -->
    <!-- ================================================= -->

    <div class="row justify-content-center">

        <div class="col-12 col-xl-10">

            <div class="card global-card border-0 shadow-sm">

                <div class="card-body p-4 p-lg-5">

                    <form method="POST">

                        {% csrf_token %}

                        <!-- ===================================== -->
                        <!-- DADOS DO GRUPO -->
                        <!-- ===================================== -->

                        <div class="mb-5">

                            <h4 class="fw-bold mb-4">

                                Informações Gerais

                            </h4>

                            <div class="row g-4">

                                <!-- Nome -->

                                <div class="col-md-8">

                                    <label class="form-label fw-semibold">

                                        Nome do Grupo

                                    </label>

                                    <input
                                        type="text"
                                        name="name"
                                        value="{{management_group.name}}"
                                        class="form-control"
                                        maxlength="150"
                                        placeholder="Ex.: Grupo de Eventos da Engenharia"
                                        required>

                                </div>


                                <!-- Descrição -->

                                <div class="col-12">

                                    <label class="form-label fw-semibold">

                                        Descrição

                                    </label>

                                    <textarea
                                        rows="6"
                                        class="form-control"
                                        name="description"
                                        maxlength="1000"
                                        placeholder="Explique o objetivo do grupo...">{{ management_group.description }}</textarea>

                                </div>

                            </div>

                        </div>



                        <!-- ===================================== -->
                        <!-- BOTÕES -->
                        <!-- ===================================== -->

                        <div class="d-grid d-md-flex justify-content-md-end gap-3">

                            <a href="{% url 'management_group_events' management_group.id %}"
                               class="btn btn-outline-secondary px-4">

                                Cancelar

                            </a>


                            <button
                                type="submit"
                                class="btn btn-primary px-4">

                                <i class="bi bi-pencil-square me-2""></i>

                                Salvar Alterações

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
