<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SympoTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #109ff2);
      min-height: 100vh;
    }
    .card {
      border: none;
      border-radius: 1rem;
    }
    .card-body {
      padding: 2rem;
    }
    .form-control {
      border-radius: 0.5rem;
    }
    .btn-primary {
      border-radius: 0.5rem;
      background-color: #0d6efd;
      border: none;
    }
    .btn-primary:hover {
      background-color: #0b5ed7;
    }
    .brand-title {
      font-weight: 600;
      color: #333;
    }
    .brand-subtitle {
      font-size: 0.9rem;
      color: #6c757d;
    }
    .capelo {
      max-width: 300px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- LEFT: LOGIN -->
    <div class="col-12 col-md-6 d-flex align-items-center justify-content-center">
      <div class="w-100" style="max-width: 500px;">
        <div class="card shadow-lg">
          <div class="card-body">

            <div class="text-center mb-4">
              <h2 class="brand-title">SympoTrack</h2>
              <p class="brand-subtitle">Gestão inteligente de eventos acadêmicos</p>
            </div>
            
            <form>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="seuemail@exemplo.com" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" placeholder="Digite sua senha" required>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember">
                  <label class="form-check-label" for="remember">Manter conectado</label>
                </div>
                <a href="#" class="small">Esqueceu a senha?</a>
              </div>

              <button type="submit" class="btn btn-primary w-100">Entrar no sistema</button>
            </form>

            <hr>

            <div class="text-center">
              <p class="mb-0">Novo por aqui? <a href="#">Solicitar acesso</a></p>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: ILUSTRAÇÃO (SÓ DESKTOP) -->
    <div class="d-none d-md-flex col-md-6 align-items-center justify-content-center">
        <svg class="capelo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 8L4 20L32 32L60 20L32 8Z" fill="white"/>
            <path d="M12 26V38C12 42 22 48 32 48C42 48 52 42 52 38V26" stroke="white" stroke-width="3"/>
            <circle cx="60" cy="20" r="2" fill="white"/>
        </svg>
        <!-- <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" fill="white" class="bi bi-calendar4-week" viewBox="0 0 80 64">
            <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M2 2a1 1 0 0 0-1 1v1h14V3a1 1 0 0 0-1-1zm13 3H1v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1z"/>
            <path d="M11 7.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm-3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm-2 3a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5zm-3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5z"/>
        </svg>   -->
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
