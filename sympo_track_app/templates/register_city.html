{% extends 'allauth/layouts/base.html' %}

{% load static %}

{% block title %}
    Criar Cidade
{% endblock %}

{% block content %}

<div class="container py-5">

    <!-- CABEÇALHO -->
    <div class="text-center mb-5">

        <div class="mb-3">

            <i class="bi bi-buildings text-primary"
               style="font-size: clamp(3rem, 5vw, 4rem);"></i>

        </div>

        <h1 class="fw-bold mb-3">

            Criar Cidade

        </h1>

        <p class="text-muted mb-0">

            Cadastre uma nova cidade para os eventos

        </p>

    </div>


    <!-- FORMULÁRIO -->
    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card global-card border-0 shadow-sm">

                <div class="card-body p-4 p-lg-5">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row g-4">

                            <!-- NOME -->
                            <div class="col-12">

                                <label class="form-label fw-semibold">

                                    Nome da Cidade

                                </label>

                                <input type="text"
                                       name="name"
                                       class="form-control"
                                       placeholder="Ex.: Fortaleza">

                            </div>


                            <!-- ESTADO -->
                            <div class="col-12">

                                <label class="form-label fw-semibold">

                                    Estado

                                </label>

                                <select name="state"
                                        class="form-select">

                                    <option value="">---</option>

                                    {% for state in states %}

                                        <option value="{{ state.id }}">

                                            {{ state.name }} ({{ state.uf }})

                                        </option>

                                    {% endfor %}

                                </select>

                            </div>

                        </div>


                        <hr class="my-5">


                        <!-- BOTÕES -->
                        <div class="d-flex justify-content-end gap-3">

                            <a href="{% url 'register_address' %}"
                               class="btn btn-outline-secondary">

                                Cancelar

                            </a>

                            <button type="submit"
                                    class="btn btn-primary">

                                <i class="bi bi-check-circle me-2"></i>

                                Salvar Cidade

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
