{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}SympoTrack{% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            min-height: 100vh;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .main-wrapper {
            min-height: 100vh;
        }

        .auth-card {
            border: none;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
        }

        .auth-left {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            padding: 3rem;
        }

        .auth-left h1 {
            font-weight: 700;
        }

        .auth-left p {
            color: rgba(255,255,255,0.8);
        }

        .feature-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background-color: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-right {
            background-color: white;
            padding: 3rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 0.85rem 1rem;
        }

        .btn-primary {
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: 600;
        }

        .brand-text {
            color: #2563eb;
            font-weight: 700;
        }

        @media (max-width: 991px) {
            .auth-left {
                display: none;
            }

            .auth-right {
                padding: 2rem;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <!-- Brand (Lado Esquerdo) -->
            <a class="navbar-brand" href="#">
                <i class="bi bi-calendar-event me-2"></i>
                SympoTrack
            </a>

            <!-- Botões (Lado Direito) -->
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <span class="text-light me-3 d-none d-md-inline">
                        Olá, {{ user.username }}
                    </span>
                    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm rounded-pill px-3">
                        <i class="bi bi-box-arrow-right me-1"></i> Sair
                    </a>
                <!--
                    <a href="{% url 'login' %}" class="btn btn-primary btn-sm rounded-pill px-4">
                        <i class="bi bi-person-fill me-1"></i> Entrar
                    </a> -->
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <main class="main-wrapper d-flex align-items-center">
        <div class="container py-5">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
